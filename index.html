<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Portfolio of a Full-Stack Developer & Creative Technologist — cinematic hero experience." />
  <title>Portfolio · Developer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       BASE RESET & TOKENS
    ============================================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --orange:   #FF6B2B;
      --gold:     #FFB347;
      --warm:     #FFF0D9;
      --blue:     #4A9EFF;
      --dark:     #080608;
      --glass-bg: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      scroll-behavior: smooth;
      background: var(--dark);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
      background: var(--dark);
    }

    /* ============================================================
       HERO SECTION
    ============================================================ */
    #hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Ambient blurred background video ── */
    #bg-video-wrap {
      position: absolute;
      inset: -8%;
      z-index: 0;
      overflow: hidden;
    }

    #bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(48px) saturate(1.4) brightness(0.55);
      transform: scale(1.05);
      pointer-events: none;
    }

    /* ── Gradient overlays ── */
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #overlay-vignette {
      z-index: 1;
      background: radial-gradient(
        ellipse 80% 80% at 50% 50%,
        transparent 20%,
        rgba(8,6,8,0.55) 70%,
        rgba(8,6,8,0.88) 100%
      );
    }

    #overlay-bottom {
      z-index: 1;
      background: linear-gradient(
        to top,
        rgba(8,6,8,0.96) 0%,
        rgba(8,6,8,0.5) 22%,
        transparent 55%
      );
    }

    #overlay-top {
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(8,6,8,0.7) 0%,
        transparent 30%
      );
    }

    #overlay-sides {
      z-index: 1;
      background: linear-gradient(
        to right,
        rgba(8,6,8,0.6) 0%,
        transparent 25%,
        transparent 75%,
        rgba(8,6,8,0.6) 100%
      );
    }

    /* ── Foreground video ── */
    #fg-video-wrap {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #fg-video {
      height: 100%;
      width: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* ── Three.js canvas overlay ── */
    #cinematic-canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 1;
    }

    /* ── Hero text ── */
    #hero-content {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(2rem, 6vw, 6rem);
      padding-bottom: clamp(6rem, 12vw, 10rem);
    }

    #hero-tagline {
      font-size: clamp(0.6rem, 1.1vw, 0.78rem);
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: clamp(1rem, 2.5vw, 2rem);
      opacity: 0;
      transform: translateY(30px);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #hero-tagline::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--orange);
      flex-shrink: 0;
    }

    .hero-name-line {
      display: block;
      font-family: 'Bebas Neue', 'Inter', sans-serif;
      font-size: clamp(4.5rem, 12vw, 13rem);
      font-weight: 400;
      line-height: 0.88;
      letter-spacing: 0.01em;
      color: #fff;
      opacity: 0;
      transform: translateY(60px);
      text-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }

    .hero-name-line.last {
      background: linear-gradient(135deg, #fff 30%, var(--gold) 80%, var(--orange) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #hero-role {
      margin-top: clamp(1.2rem, 2.5vw, 2.4rem);
      font-size: clamp(0.8rem, 1.6vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.65);
      max-width: 42ch;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(30px);
    }

    #hero-role span {
      color: var(--blue);
      font-weight: 400;
    }

    /* ── Controls (bottom-right) ── */
    #controls {
      position: absolute;
      bottom: clamp(1.8rem, 4vw, 3rem);
      right: clamp(1.5rem, 4vw, 3.5rem);
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
    }

    .ctrl-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, border-color 0.25s, transform 0.2s;
      outline: none;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.28);
      transform: scale(1.08);
    }

    .ctrl-btn:active {
      transform: scale(0.95);
    }

    .ctrl-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* ── Sound badge ── */
    #sound-badge {
      position: absolute;
      bottom: clamp(5.5rem, 10vw, 8rem);
      right: clamp(1.5rem, 4vw, 3.5rem);
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 1rem 0.45rem 0.7rem;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }

    #sound-badge.visible {
      opacity: 1;
    }

    #sound-badge.hidden {
      opacity: 0;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      animation: badge-pulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes badge-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Scroll indicator ── */
    #scroll-indicator {
      position: absolute;
      bottom: clamp(1.6rem, 3.5vw, 2.8rem);
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #scroll-indicator:hover {
      opacity: 0.9 !important;
    }

    .scroll-label {
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .scroll-track {
      width: 1px;
      height: 52px;
      background: rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      border-radius: 1px;
    }

    .scroll-line {
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--orange), transparent);
      animation: scroll-pulse 2s ease-in-out infinite;
    }

    @keyframes scroll-pulse {
      0%   { top: -100%; }
      100% { top: 100%; }
    }

    /* ============================================================
       NEXT SECTION (placeholder)
    ============================================================ */
    #next-section {
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      padding: 4rem 2rem;
    }

    .section-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0.7;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 7rem);
      color: rgba(255,255,255,0.08);
      letter-spacing: 0.06em;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      #hero-content {
        align-items: center;
        text-align: center;
        justify-content: flex-end;
        padding-bottom: 7rem;
      }

      #hero-tagline {
        justify-content: center;
      }

      #hero-tagline::before {
        display: none;
      }

      #hero-role {
        text-align: center;
      }

      .ctrl-btn {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>

<!-- ============================================================
     HERO SECTION
============================================================ -->
<section id="hero" role="banner" aria-label="Portfolio hero">

  <!-- Ambient blurred background -->
  <div id="bg-video-wrap" aria-hidden="true">
    <video id="bg-video" autoplay loop muted playsinline preload="auto">
      <source src="myvideo.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Gradient overlays -->
  <div class="overlay" id="overlay-vignette" aria-hidden="true"></div>
  <div class="overlay" id="overlay-bottom"   aria-hidden="true"></div>
  <div class="overlay" id="overlay-top"      aria-hidden="true"></div>
  <div class="overlay" id="overlay-sides"    aria-hidden="true"></div>

  <!-- Main foreground video -->
  <div id="fg-video-wrap" aria-hidden="true">
    <video id="fg-video" autoplay loop muted playsinline preload="auto">
      <source src="myvideo.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Three.js cinematic canvas -->
  <canvas id="cinematic-canvas" aria-hidden="true"></canvas>

  <!-- Hero content -->
  <div id="hero-content">
    <p id="hero-tagline">Available for Work &nbsp;·&nbsp; 2026</p>
    <h1>
      <span class="hero-name-line first" id="name-first">Rahul</span>
      <span class="hero-name-line last"  id="name-last">Kumar</span>
    </h1>
    <p id="hero-role">
      Full-Stack Developer &amp; <span>Creative Technologist</span><br/>
      Crafting immersive digital experiences at the intersection<br/>
      of code, design, and motion.
    </p>
  </div>

  <!-- Sound badge -->
  <div id="sound-badge" role="status" aria-live="polite">
    <span class="badge-dot"></span>
    Tap for sound
  </div>

  <!-- Controls -->
  <div id="controls" role="group" aria-label="Video controls">
    <button class="ctrl-btn" id="btn-play" aria-label="Pause video" title="Play / Pause">
      <!-- Pause icon (default since video plays) -->
      <svg id="icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <svg id="icon-play"  viewBox="0 0 24 24" style="display:none"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-mute" aria-label="Unmute video" title="Mute / Unmute">
      <!-- Muted icon (default since video starts muted) -->
      <svg id="icon-muted" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" fill="none"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <svg id="icon-sound" viewBox="0 0 24 24" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- Scroll indicator -->
  <div id="scroll-indicator" role="button" tabindex="0" aria-label="Scroll to next section">
    <span class="scroll-label">Scroll</span>
    <div class="scroll-track">
      <div class="scroll-line"></div>
    </div>
  </div>

</section>

<!-- ============================================================
     NEXT SECTION
============================================================ -->
<section id="next-section" aria-label="Portfolio content">
  <p class="section-eyebrow">Selected Work</p>
  <h2 class="section-title">Coming Soon</h2>
</section>


<!-- ============================================================
     SCRIPTS — Three.js + GSAP via CDN (ESM)
============================================================ -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { gsap } from 'gsap';

/* ============================================================
   CINEMATIC THREE.JS LAYER
   Warm bokeh particles with mouse parallax
============================================================ */
(function initCinematicLayer() {
  const canvas   = document.getElementById('cinematic-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setClearColor(0x000000, 0);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
  camera.position.z = 6;

  /* Particle count — responsive */
  const isMobile = window.innerWidth < 768;
  const COUNT    = isMobile ? 700 : 1500;

  /* Geometry */
  const geo       = new THREE.BufferGeometry();
  const positions = new Float32Array(COUNT * 3);
  const colors    = new Float32Array(COUNT * 3);
  const sizes     = new Float32Array(COUNT);
  const phases    = new Float32Array(COUNT);   // for sine wave
  const speeds    = new Float32Array(COUNT);
  const amps      = new Float32Array(COUNT);

  const palette = [
    new THREE.Color('#FF6B2B'),  // warm orange
    new THREE.Color('#FFB347'),  // gold
    new THREE.Color('#FFF0D9'),  // warm white
    new THREE.Color('#FF8C55'),  // peach
    new THREE.Color('#4A9EFF'),  // monitor blue accent (rare)
  ];

  for (let i = 0; i < COUNT; i++) {
    const i3 = i * 3;
    /* spread wide and deep for cinematic depth */
    positions[i3]     = (Math.random() - 0.5) * 22;
    positions[i3 + 1] = (Math.random() - 0.5) * 14;
    positions[i3 + 2] = (Math.random() - 0.5) * 10 - 2;

    /* color palette — bias toward orange/gold */
    const colIdx = Math.random() < 0.06 ? 4 : Math.floor(Math.random() * 4);
    const col    = palette[colIdx];
    /* randomize brightness for depth feel */
    const bright = 0.3 + Math.random() * 0.7;
    colors[i3]     = col.r * bright;
    colors[i3 + 1] = col.g * bright;
    colors[i3 + 2] = col.b * bright;

    sizes[i]  = Math.random() * (isMobile ? 18 : 28) + 4;
    phases[i] = Math.random() * Math.PI * 2;
    speeds[i] = 0.18 + Math.random() * 0.35;
    amps[i]   = 0.08 + Math.random() * 0.22;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  /* Glowing circle texture */
  const texCanvas  = document.createElement('canvas');
  texCanvas.width  = 64;
  texCanvas.height = 64;
  const ctx        = texCanvas.getContext('2d');
  const grd        = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  grd.addColorStop(0,    'rgba(255,255,255,1)');
  grd.addColorStop(0.25, 'rgba(255,255,255,0.7)');
  grd.addColorStop(0.6,  'rgba(255,255,255,0.15)');
  grd.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 64, 64);
  const sprite = new THREE.CanvasTexture(texCanvas);

  const mat = new THREE.PointsMaterial({
    size:            0.18,
    sizeAttenuation: true,
    map:             sprite,
    vertexColors:    true,
    transparent:     true,
    opacity:         0.72,
    blending:        THREE.AdditiveBlending,
    depthWrite:      false,
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);

  /* Resize handler */
  function resize() {
    const w = canvas.parentElement.offsetWidth;
    const h = canvas.parentElement.offsetHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize, { passive: true });

  /* Mouse parallax */
  const mouse = { x: 0, y: 0 };
  const camTarget = { x: 0, y: 0 };
  window.addEventListener('mousemove', (e) => {
    mouse.x =  (e.clientX / window.innerWidth  - 0.5) * 2;
    mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
  }, { passive: true });

  /* Animation loop */
  let rafId;
  function animate(t) {
    rafId = requestAnimationFrame(animate);
    const time = t * 0.001;

    /* Update particle positions — gentle sine drift */
    const pos = geo.attributes.position;
    const sz  = geo.attributes.size;
    for (let i = 0; i < COUNT; i++) {
      const i3 = i * 3;
      pos.array[i3 + 1] += Math.sin(time * speeds[i] + phases[i]) * amps[i] * 0.004;
      pos.array[i3]     += Math.cos(time * speeds[i] * 0.6 + phases[i]) * amps[i] * 0.002;
      /* subtle size breathing */
      sz.array[i] = sizes[i] * (0.85 + 0.15 * Math.sin(time * speeds[i] * 0.8 + phases[i]));
    }
    pos.needsUpdate = true;
    sz.needsUpdate  = true;

    /* Smooth camera parallax */
    camTarget.x += (mouse.x * 0.55 - camTarget.x) * 0.03;
    camTarget.y += (mouse.y * 0.35 - camTarget.y) * 0.03;
    camera.position.x = camTarget.x;
    camera.position.y = camTarget.y;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }
  animate(0);

  /* Cleanup on page hide */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) cancelAnimationFrame(rafId);
    else animate(0);
  });
})();


/* ============================================================
   VIDEO CONTROLS
============================================================ */
const fgVideo  = document.getElementById('fg-video');
const bgVideo  = document.getElementById('bg-video');
const btnPlay  = document.getElementById('btn-play');
const btnMute  = document.getElementById('btn-mute');
const iconPause = document.getElementById('icon-pause');
const iconPlay  = document.getElementById('icon-play');
const iconMuted = document.getElementById('icon-muted');
const iconSound = document.getElementById('icon-sound');

let isPlaying = true;
let isMuted   = true;

/* Sync both videos together */
function syncVideos() {
  bgVideo.currentTime = fgVideo.currentTime;
}
fgVideo.addEventListener('seeked', syncVideos, { passive: true });

btnPlay.addEventListener('click', () => {
  if (isPlaying) {
    fgVideo.pause();
    bgVideo.pause();
    iconPause.style.display = 'none';
    iconPlay.style.display  = '';
    btnPlay.setAttribute('aria-label', 'Play video');
  } else {
    fgVideo.play();
    bgVideo.play();
    iconPause.style.display = '';
    iconPlay.style.display  = 'none';
    btnPlay.setAttribute('aria-label', 'Pause video');
  }
  isPlaying = !isPlaying;
});

btnMute.addEventListener('click', () => {
  isMuted = !isMuted;
  fgVideo.muted = isMuted;
  /* bg video always stays muted to avoid double audio */
  if (isMuted) {
    iconMuted.style.display = '';
    iconSound.style.display = 'none';
    btnMute.setAttribute('aria-label', 'Unmute video');
  } else {
    iconMuted.style.display = 'none';
    iconSound.style.display = '';
    btnMute.setAttribute('aria-label', 'Mute video');
    /* hide badge once user unmutes */
    hideBadge();
  }
});


/* ============================================================
   SOUND BADGE — show on load, auto-hide after 4s
============================================================ */
const badge = document.getElementById('sound-badge');

function showBadge() {
  badge.classList.add('visible');
  badge.classList.remove('hidden');
}
function hideBadge() {
  badge.classList.remove('visible');
  badge.classList.add('hidden');
}

setTimeout(showBadge, 1800);
setTimeout(hideBadge, 5600);


/* ============================================================
   SCROLL INDICATOR
============================================================ */
const scrollBtn = document.getElementById('scroll-indicator');
scrollBtn.addEventListener('click',   scrollToNext);
scrollBtn.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') scrollToNext(); });

function scrollToNext() {
  document.getElementById('next-section').scrollIntoView({ behavior: 'smooth' });
}


/* ============================================================
   GSAP ENTRANCE ANIMATIONS
============================================================ */
function runEntranceAnimation() {
  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

  tl.to('#hero-tagline',   { opacity: 1, y: 0, duration: 1.1, delay: 0.4 })
    .to('#name-first',      { opacity: 1, y: 0, duration: 1.2 }, '-=0.7')
    .to('#name-last',       { opacity: 1, y: 0, duration: 1.2 }, '-=0.9')
    .to('#hero-role',       { opacity: 1, y: 0, duration: 1.0 }, '-=0.75')
    .to('#controls',        { opacity: 1,        duration: 0.9 }, '-=0.6')
    .to('#scroll-indicator',{ opacity: 0.55,     duration: 0.9 }, '-=0.6');
}

/* Wait for fonts + first frame before animating */
if (document.fonts) {
  document.fonts.ready.then(runEntranceAnimation);
} else {
  window.addEventListener('load', runEntranceAnimation);
}


/* ============================================================
   HERO VIDEO LOAD FADE-IN
============================================================ */
gsap.set('#hero', { opacity: 0 });

function heroFadeIn() {
  gsap.to('#hero', { opacity: 1, duration: 1.6, ease: 'power2.out' });
}

if (fgVideo.readyState >= 3) {
  heroFadeIn();
} else {
  fgVideo.addEventListener('canplay', heroFadeIn, { once: true });
  /* Fallback if video is slow */
  setTimeout(heroFadeIn, 1000);
}

</script>

</body>
</html>
